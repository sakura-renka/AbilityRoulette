<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4CAF50">

<title>Ability Roulette</title>

<style>

:root{
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#222;
    --border:#dddddd;
    --main:#4CAF50;
    --main2:#2196F3;
    --danger:#e74c3c;
    --shadow:0 5px 15px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:15px;
    padding-bottom:80px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:30px;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:var(--shadow);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

.green{
    background:var(--main);
    color:white;
}

.blue{
    background:var(--main2);
    color:white;
}

.gray{
    background:#888;
    color:white;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    min-height:70px;
}

.list{
    margin-top:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
}

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

.right{
    display:flex;
    gap:6px;
}

.small{
    width:auto;
    padding:8px 12px;
    margin:0;
    font-size:14px;
}

.history{
    max-height:180px;
    overflow:auto;
    margin-top:10px;
    font-size:15px;
}

.history div{
    padding:6px 0;
    border-bottom:1px solid #eee;
}

@media (max-width:500px){

h1{
    font-size:26px;
}

.result{
    font-size:26px;
}

button{
    font-size:16px;
}

}

.on{
    color:#2ecc71;
    font-weight:bold;
}

.off{
    color:#e74c3c;
    font-weight:bold;
}

body.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
    --border:#444444;
    --shadow:0 5px 15px rgba(0,0,0,.5);
}

/* ===== 編集ウィンドウ ===== */

.modal{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;

}

.modal.show{

    display:flex;

}

.modal-card{

    width:90%;
    max-width:380px;

    background:var(--card);

    color:var(--text);

    border-radius:18px;

    padding:20px;

    box-shadow:var(--shadow);

}

.modal-card h2{

    margin-bottom:15px;

    text-align:center;

}

.modal-card input{

    margin-bottom:12px;

}

.modal-buttons{

    display:flex;

    gap:10px;

}

.modal-buttons button{

    flex:1;

}

</style>

</head>

<body>

<h1>🎲 Ability Roulette</h1>

<!-- 検索 -->

<div class="card">

    <h2>🔍 能力検索</h2>

    <input
        id="search"
        type="text"
        placeholder="能力名を検索..."
    >

</div>

<!-- 能力一覧 -->

<div class="card">

    <h2>📋 能力一覧</h2>

<div id="abilityInfo" style="margin-top:8px;font-size:14px;color:gray;">
能力数：0
</div>

<div style="display:flex;gap:10px;margin:10px 0;">

    <button
        class="small blue"
        onclick="sortAbilityAZ()">
        名前順
    </button>

    <button
        class="small green"
        onclick="sortAbilityAdd()">
        追加順
    </button>

</div>

    <div
        id="abilityList"
        class="list"
    ></div>

</div>

<!-- 抽選 -->

<div class="card">

    <h2>🎰 ルーレット</h2>

    <button
        class="green"
        onclick="spinOne()"
    >
        🎲 1個抽選
    </button>

    <button
        class="blue"
        onclick="spinTwo()"
    >
        🎲🎲 2個抽選
    </button>

    <button
        class="gray"
        onclick="fastSpin()"
    >
        ⚡ 高速ルーレット
    </button>

    <div
        id="result"
        class="result"
    >
        抽選結果
    </div>

</div>

<!-- 能力追加 -->

<div class="card">

    <h2>➕ 能力追加</h2>

    <input
        id="iconInput"
        placeholder="アイコン 😀"
    >

    <input
        id="nameInput"
        placeholder="能力名"
    >

    <button
        class="green"
        onclick="addAbility()"
    >
        追加
    </button>

<hr style="margin:20px 0;">

<h3>📋 一括追加</h3>

<textarea
    id="bulkInput"
    placeholder="1行に1能力&#10;🔥 炎&#10;💧 水&#10;🌪️ 風"
    style="
        width:100%;
        height:180px;
        margin-top:10px;
        padding:10px;
        border-radius:10px;
        font-size:15px;
        resize:vertical;
    "
></textarea>

<button
    class="blue"
    onclick="bulkAddAbilities()">

    📋 一括追加

</button>

</div>

<!-- 履歴 -->

<div class="card">

    <h2>🕒 履歴</h2>

    <div
        id="history"
        class="history"
    >
    </div>

</div>

<!-- ダークモード -->

<div class="card">

    <button
        class="gray"
        onclick="toggleDarkMode()"
    >
        🌙 ダークモード
    </button>

</div>

<!-- 設定 -->

<div class="card">

    <h2>⚙️ 設定</h2>

    <button
        class="blue"
        onclick="exportData()">

        📦 バックアップを保存

    </button>

<input
    type="file"
    id="importFile"
    accept=".json"
    style="display:none"
    onchange="importData(event)"
>

<button
    class="green"
    onclick="document.getElementById('importFile').click()">

    📂 バックアップを読み込む

</button>

<input
    type="file"
    id="txtImport"
    accept=".txt"
    style="display:none"
    onchange="importTxt(event)"
>

<button
    class="green"
    onclick="document.getElementById('txtImport').click()">

    📄 TXT読み込み

</button>

</div>

<!-- 編集ウィンドウ -->

<div
id="editModal"
class="modal">

    <div class="modal-card">

        <h2>✏️ 能力編集</h2>

        <input
            id="editIcon"
            placeholder="アイコン 😀"
        >

        <input
            id="editName"
            placeholder="能力名"
        >

        <div class="modal-buttons">

            <button
                class="green"
                onclick="saveEdit()">

                保存

            </button>

            <button
                class="gray"
                onclick="closeEdit()">

                キャンセル

            </button>

        </div>

    </div>

</div>

<script>
//==============================
// Ability Roulette Version 1
// データ管理
//==============================

const STORAGE_KEY = "abilityRouletteData";
const DARK_KEY = "abilityRouletteDark";

const HISTORY_KEY = "abilityRouletteHistory";

let historyList = [];

let abilities = [
    {
        id:1,
        icon:"🔥",
        name:"炎",
        enabled:true
    },
    {
        id:2,
        icon:"💧",
        name:"水",
        enabled:true
    },
    {
        id:3,
        icon:"🌪️",
        name:"風",
        enabled:true
    },
    {
        id:4,
        icon:"🌱",
        name:"草",
        enabled:true
    }
];

//==============================
// 保存
//==============================

function saveData(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(abilities)
    );

}

//==============================
// 履歴保存
//==============================

function saveHistory(){

    localStorage.setItem(
        HISTORY_KEY,
        JSON.stringify(historyList)
    );

}

//==============================
// 履歴読み込み
//==============================

function loadHistory(){

    const data =
        localStorage.getItem(HISTORY_KEY);

    if(data){

        historyList =
            JSON.parse(data);

    }

}

//==============================
// ダークモード読み込み
//==============================

function loadDarkMode(){

    const dark =
        localStorage.getItem(DARK_KEY);

    if(dark==="true"){

        document.body.classList.add("dark");

    }

}

//==============================
// 読み込み
//==============================

function loadData(){

    const data =
        localStorage.getItem(STORAGE_KEY);

    if(data){

        abilities = JSON.parse(data);

    }else{

        saveData();

    }

}

//==============================
// 一覧表示
//==============================

function renderAbilities(){

    const list = document.getElementById("abilityList");
    const info = document.getElementById("abilityInfo");

    list.innerHTML = "";

    const keyword = document
        .getElementById("search")
        .value
        .toLowerCase();

    const enabledCount =
        abilities.filter(a=>a.enabled).length;

    info.innerHTML = `
能力数：${abilities.length}
　|　
有効：${enabledCount}
　|　
無効：${abilities.length-enabledCount}
`;

    abilities.forEach(ability=>{

        if(!ability.name.toLowerCase().includes(keyword)){
            return;
        }

        list.innerHTML += `

        <div class="item">

            <div class="left">

                <span style="font-size:28px">
                    ${ability.icon}
                </span>

                <div>

                    <div>${ability.name}</div>

                    <small class="${ability.enabled ? "on":"off"}">
                        ${ability.enabled ? "ON":"OFF"}
                    </small>

                </div>

            </div>

            <div class="right">

                <button
                    class="small blue"
                    onclick="toggleAbility(${ability.id})">
                    ${ability.enabled ? "OFF":"ON"}
                </button>

                <button
                    class="small green"
                    onclick="editAbility(${ability.id})">
                    編集
                </button>

                <button
                    class="small"
                    style="background:#e74c3c;color:white"
                    onclick="deleteAbility(${ability.id})">
                    削除
                </button>

            </div>

        </div>

        `;

    });

}

//==============================
// 名前順
//==============================

function sortAbilityAZ(){

    abilities.sort((a,b)=>
        a.name.localeCompare(
            b.name,
            "ja"
        )
    );

    saveData();
    renderAbilities();

}

//==============================
// 追加順
//==============================

function sortAbilityAdd(){

    abilities.sort((a,b)=>a.id-b.id);

    saveData();
    renderAbilities();

}

//==============================
// 検索
//==============================

document
.getElementById("search")
.addEventListener(
    "input",
    renderAbilities
);

//==============================
// アプリ初期化
//==============================

function init(){

    loadData();
    loadHistory();
    loadDarkMode();

    renderAbilities();
    renderHistory();

    setupEditModal();

}

init();

//==============================
// 有効な能力一覧を取得
//==============================

function getEnabledAbilities(){

    return abilities.filter(
        ability => ability.enabled
    );

}

//==============================
// 履歴追加
//==============================

function addHistory(text){

    historyList.unshift(text);

    if(historyList.length>20){

        historyList.pop();

    }

    saveHistory();

    renderHistory();

}

//==============================
// 履歴表示
//==============================

function renderHistory(){

    const history =
        document.getElementById("history");

    history.innerHTML="";

    historyList.forEach(item=>{

        history.innerHTML += `
        <div>${item}</div>
        `;

    });

}

//==============================
// 1個抽選
//==============================

function spinOne(){

    const list =
        getEnabledAbilities();

    if(list.length===0){

        alert("有効な能力がありません。");
        return;

    }

    const result =
        list[
            Math.floor(
                Math.random()*list.length
            )
        ];

    document.getElementById("result").innerHTML=
        `
        ${result.icon}<br>
        ${result.name}
        `;

    addHistory(
        `${result.icon} ${result.name}`
    );

}

//==============================
// 2個抽選
//==============================

function spinTwo(){

    const list =
        [...getEnabledAbilities()];

    if(list.length<2){

        alert("能力が2個以上必要です。");
        return;

    }

    list.sort(()=>Math.random()-0.5);

    document.getElementById("result").innerHTML=
        `
        ${list[0].icon} ${list[0].name}
        <br><br>
        ${list[1].icon} ${list[1].name}
        `;
addHistory(
    `${list[0].icon} ${list[0].name} / ${list[1].icon} ${list[1].name}`
);
    
}

//==============================
// 高速ルーレット
//==============================

function fastSpin(){

    const list=getEnabledAbilities();

    if(list.length===0){

        alert("有効な能力がありません。");
        return;

    }

    const result=document.getElementById("result");

    let count=0;

    const timer=setInterval(()=>{

        const random=
            list[
                Math.floor(Math.random()*list.length)
            ];

        result.innerHTML=
            `
            ${random.icon}
            <br>
            ${random.name}
            `;

        count++;

        if(count>=20){

            clearInterval(timer);

            spinOne();

        }

    },100);

}

//==============================
// ON / OFF
//==============================

function toggleAbility(id){

    abilities=abilities.map(ability=>{

        if(ability.id===id){

            ability.enabled=!ability.enabled;

        }

        return ability;

    });

    saveData();

    renderAbilities();

}

//==============================
// 能力削除
//==============================

function deleteAbility(id){

    if(!confirm("この能力を削除しますか？")){
        return;
    }

    abilities = abilities.filter(
        ability => ability.id !== id
    );

    saveData();

    renderAbilities();

}

//==============================
// 編集保存
//==============================

function saveEdit(){

    if(editingId===null){
        return;
    }

    const icon=document
        .getElementById("editIcon")
        .value
        .trim();

    const name=document
        .getElementById("editName")
        .value
        .trim();

    if(name===""){

        alert("能力名を入力してください。");
        return;

    }

    const ability=abilities.find(
        a=>a.id===editingId
    );

    if(!ability){
        return;
    }

    ability.icon=icon || "✨";
    ability.name=name;

    saveData();

    renderAbilities();

    closeEdit();

}

//==============================
// 編集終了
//==============================

function closeEdit(){

    editingId=null;

    document
        .getElementById("editModal")
        .classList.remove("show");

    document
        .getElementById("editIcon")
        .value="";

    document
        .getElementById("editName")
        .value="";

}

//==============================
// 編集モーダル初期化
//==============================

function setupEditModal(){

    const modal=document.getElementById("editModal");

    modal.addEventListener("click",e=>{

        if(e.target===modal){

            closeEdit();

        }

    });

    document
        .getElementById("editName")
        .addEventListener("keydown",e=>{

            if(e.key==="Enter"){

                saveEdit();

            }

        });

}

//==============================
// 編集ウィンドウ
//==============================

let editingId = null;

function editAbility(id){

    const ability = abilities.find(
        a => a.id === id
    );

    if(!ability){
        return;
    }

    editingId = id;

    document
        .getElementById("editIcon")
        .value = ability.icon;

    document
        .getElementById("editName")
        .value = ability.name;

    document
        .getElementById("editModal")
        .classList.add("show");

}

//==============================
// 能力追加
//==============================

function addAbility(){

    const icon =
        document.getElementById("iconInput")
        .value
        .trim() || "✨";

    const name =
        document.getElementById("nameInput")
        .value
        .trim();

    if(name===""){

        alert("能力名を入力してください。");
        return;

    }

//==============================
// 重複チェック
//==============================

const exists = abilities.some(
    ability =>
        ability.name.toLowerCase() ===
        name.toLowerCase()
);

if(exists){

    alert("同じ能力が既にあります。");
    return;

}



    abilities.push({

        id:Date.now(),

        icon:icon,

        name:name,

        enabled:true

    });

    saveData();

    renderAbilities();

    document.getElementById("iconInput").value="";
    document.getElementById("nameInput").value="";

}

//==============================
// 一括追加
//==============================

function bulkAddAbilities(){

    const text=document
        .getElementById("bulkInput")
        .value
        .trim();

    if(text===""){

        alert("能力を入力してください。");
        return;

    }

    const lines=text.split("\n");

    let count=0;

    lines.forEach(line=>{

        line=line.trim();

        if(line===""){
            return;
        }

        let icon="✨";
        let name=line;

        const first=line.split(" ");

        if(first.length>=2){

            icon=first[0];
            name=line.substring(icon.length).trim();

        }

        abilities.push({

            id:Date.now()+Math.random(),

            icon,

            name,

            enabled:true

        });

        count++;

    });

    saveData();

    renderAbilities();

    document.getElementById("bulkInput").value="";

    alert(count+"個追加しました！");

}

//==============================
// ダークモード
//==============================

function toggleDarkMode(){

    document.body.classList.toggle("dark");

    const isDark =
        document.body.classList.contains("dark");

    localStorage.setItem(
        DARK_KEY,
        isDark
    );

}

//==============================
// データ書き出し
//==============================

function exportData(){

    const data={

        abilities,
        historyList

    };

    const blob=new Blob(

        [
            JSON.stringify(data,null,2)
        ],

        {
            type:"application/json"
        }

    );

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="AbilityRoulette_Backup.json";

    a.click();

    URL.revokeObjectURL(url);

}

//==============================
// データ読み込み
//==============================

function importData(event){

    const file = event.target.files[0];

    if(!file){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        try{

            const data = JSON.parse(e.target.result);

            if(data.abilities){

                abilities = data.abilities;

            }

            if(data.historyList){

                historyList = data.historyList;

            }

            saveData();
            saveHistory();

            renderAbilities();
            renderHistory();

            alert("バックアップを読み込みました！");

        }catch(error){

            alert("バックアップファイルを読み込めませんでした。");

        }

    };

    reader.readAsText(file);

    event.target.value = "";

}

//==============================
// TXT読み込み
//==============================

function importTxt(event){

    const file = event.target.files[0];

    if(!file){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const text = e.target.result;

        const lines = text.split(/\r?\n/);

        let count = 0;

        lines.forEach(line=>{

            line = line.trim();

            if(line===""){
                return;
            }

            let icon="✨";
            let name=line;

            const parts=line.split(" ");

            if(parts.length>=2){

                icon=parts.shift();

                name=parts.join(" ");

            }

            abilities.push({

                id:Date.now()+Math.random(),

                icon:icon,

                name:name,

                enabled:true

            });

            count++;

        });

        saveData();

        renderAbilities();

        alert(count+"個追加しました！");

    };

    reader.readAsText(file,"UTF-8");

    event.target.value="";

}

</script>

</body>
</html>
